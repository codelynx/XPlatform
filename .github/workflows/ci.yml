name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    name: macOS Build and Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version
      - name: Build
        run: xcodebuild -scheme XPlatform -destination 'generic/platform=iOS' -skipPackagePluginValidation build
